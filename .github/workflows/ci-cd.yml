name: Database CI/CD

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  validate:
    name: Validate Database Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.head_ref == 'development')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint SQL files (sqlfluff)
        run: |
          python -m pip install --upgrade pip
          pip install sqlfluff
          sqlfluff lint init --dialect postgres

      - name: Build PostgreSQL image
        run: docker build -t db-init:test .

      - name: Start PostgreSQL container
        run: |
          docker run -d \
            --name pg-test \
            -e POSTGRES_DB=testdb \
            -e POSTGRES_USER=testuser \
            -e POSTGRES_PASSWORD=testpass \
            -p 5432:5432 \
            db-init:test

      - name: Wait for PostgreSQL readiness
        run: |
          for i in {1..30}; do
            if docker exec pg-test pg_isready -U testuser -d testdb; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          docker logs pg-test
          exit 1

      - name: Verify initialization scripts
        run: |
          docker exec pg-test psql \
            -U testuser \
            -d testdb \
            -v ON_ERROR_STOP=1 \
            -c "SELECT 1;"

          docker exec pg-test psql \
            -U testuser \
            -d testdb \
            -v ON_ERROR_STOP=1 \
            -c "SELECT extname FROM pg_extension WHERE extname = 'uuid-ossp';"

      - name: Security scan (Trivy, informational)
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          image-ref: db-init:test
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Sonar scan
        if: github.ref == 'refs/heads/main'
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: Sonar quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Cleanup test container
        if: always()
        run: docker rm -f pg-test || true

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref_name == 'development' || github.ref_name == 'main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag
        id: image_meta
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_NAME="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')"

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            TAG="latest"
          else
            TAG="dev"
          fi

          echo "image=${{ vars.DOCKERHUB_USERNAME }}/$REPO_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_meta.outputs.image }}:${{ steps.image_meta.outputs.tag }}
