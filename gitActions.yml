name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  postgres-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------
      # Dockerfile lint
      # --------------------
      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # --------------------
      # SQL linting
      # --------------------
      - name: Lint SQL files (sqlfluff)
        run: |
          pip install sqlfluff
          sqlfluff lint init --dialect postgres

      # --------------------
      # Build Docker image
      # --------------------
      - name: Build PostgreSQL image
        run: docker build -t pg-init:test .

      # --------------------
      # Run container
      # --------------------
      - name: Start PostgreSQL container
        run: |
          docker run -d \
            --name pg-test \
            -e POSTGRES_DB=testdb \
            -e POSTGRES_USER=testuser \
            -e POSTGRES_PASSWORD=testpass \
            -p 5432:5432 \
            pg-init:test

      # --------------------
      # Wait for DB readiness
      # --------------------
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker exec pg-test pg_isready -U testuser; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready"
          docker logs pg-test
          exit 1

      # --------------------
      # Verify init scripts ran
      # --------------------
      - name: Verify database objects
        run: |
          docker exec pg-test psql \
            -U testuser \
            -d testdb \
            -c "SELECT 1;"

          # Example: verify a table exists
          docker exec pg-test psql \
            -U testuser \
            -d testdb \
            -c "SELECT 1 FROM information_schema.tables WHERE table_name = 'users';"

      # --------------------
      # Security scan
      # --------------------
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: pg-init:test
          severity: CRITICAL,HIGH
