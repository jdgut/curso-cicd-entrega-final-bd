version: "3.9"

services:
  postgres:
    container_name: cicd-db
    build: .
    env_file:
          - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - cicd-network

volumes:
  postgres_data:

networks:
  cicd-network:
    name: cicd-network